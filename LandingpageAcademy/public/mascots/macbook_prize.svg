<svg viewBox="0 0 280 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lidGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c8b0"/>
      <stop offset="100%" stop-color="#c9a98a"/>
    </linearGradient>
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0020"/>
      <stop offset="100%" stop-color="#1e0040"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <radialGradient id="screenGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#5b00a0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- LID -->
  <g filter="url(#dropShadow)">
    <rect x="10" y="4" width="260" height="162" rx="9" fill="url(#lidGrad)"/>
    <rect x="14" y="8" width="252" height="154" rx="6" fill="#111"/>
    <rect x="18" y="12" width="244" height="146" rx="4" fill="url(#screenBg)"/>
    <rect x="18" y="12" width="244" height="146" rx="4" fill="url(#screenGlow)"/>

    <!-- Subtle star decorations -->
    <text x="28" y="42" font-size="11" opacity="0.4">✨</text>
    <text x="234" y="47" font-size="10" opacity="0.35">⭐</text>
    <text x="30" y="138" font-size="9"  opacity="0.3">🌟</text>
    <text x="228" y="140" font-size="11" opacity="0.35">✨</text>

    <!-- Trophy -->
    <text x="140" y="48" text-anchor="middle" font-size="22">🏆</text>

    <!-- "WIN A" — large & golden -->
    <text
      x="140" y="78"
      text-anchor="middle"
      font-family="Arial Black, Arial, sans-serif"
      font-size="22"
      font-weight="900"
      fill="#FFD700"
      filter="url(#textGlow)"
      letter-spacing="4">WIN A</text>

    <!-- "MacBook!" — white, slightly smaller than WIN A -->
    <text
      x="140" y="103"
      text-anchor="middle"
      font-family="Arial Black, Arial, sans-serif"
      font-size="20"
      font-weight="900"
      fill="#FFFFFF"
      filter="url(#textGlow)"
      letter-spacing="1">MacBook!</text>

    <!-- Glowing underline -->
    <rect x="68" y="109" width="144" height="3" rx="1.5" fill="#FF8C00" opacity="0.9"/>

    <!-- Subtext -->
    <text
      x="140" y="130"
      text-anchor="middle"
      font-family="Arial, sans-serif"
      font-size="9"
      font-weight="700"
      fill="#ff9f50"
      letter-spacing="0.5">Top project wins it!</text>

    <!-- Camera dot -->
    <ellipse cx="140" cy="10" rx="3.5" ry="2" fill="#2a2a2a"/>
  </g>

  <!-- BASE -->
  <rect x="10" y="164" width="260" height="5" rx="2" fill="#b8907a"/>
  <path d="M0,169 L280,169 L288,181 L-8,181 Z" fill="#d4b09a"/>
  <rect x="105" y="171" width="70" height="6" rx="3" fill="#c0a088" opacity="0.8"/>
  <path d="M-8,181 L288,181 L284,186 L-4,186 Z" fill="#b8907a"/>
</svg>
